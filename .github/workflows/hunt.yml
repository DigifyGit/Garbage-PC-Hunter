name: Daily Laptop Hunt
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hunt-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd functions && npm install
      - name: Install Playwright
        run: cd functions && npx playwright install chromium --with-deps
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SeleniumBase
        run: pip install seleniumbase
      - name: Write Facebook Auth Secret
        run: |
          mkdir -p functions
          printf '%s' '${{ secrets.FACEBOOK_AUTH }}' > functions/facebook-auth.json
      - name: Run Scraper and Generate HTML
        run: node functions/runner.js
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
