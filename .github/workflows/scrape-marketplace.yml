name: Scrape Facebook Marketplace

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Fail fast after 10 min instead of 6 hours

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install playwright@1.49.0 --save-dev

      - run: npx playwright install-deps && npx playwright install chromium

      - run: node facebook-marketplace-scraper.js
        env:
          PLAYWRIGHT_BROWSER: chromium

      - uses: actions/upload-artifact@v4
        if: always()  # Upload even on failure
        with:
          name: marketplace-results
          path: |
            marketplace-listings.json
            marketplace-screenshot.png
          retention-days: 7
